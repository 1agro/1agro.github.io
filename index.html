<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Sistemas Grupo Locks</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png" type="image/png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .background {
            position: fixed;
            inset: 0;
            background: url('Wallpaper-18-anos.png') no-repeat center center / cover;
            filter: brightness(0.55);
            z-index: -1;
        }

        .overlay {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 28px 28px 20px;
            gap: 14px;
        }

        /* ── Header ── */
        .header { text-align: center; flex-shrink: 0; }

        .header h1 {
            color: #fff;
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: -0.4px;
            text-shadow: 0 2px 14px rgba(0,0,0,0.4);
            line-height: 1.1;
        }

        .header .subtitle {
            color: rgba(255,255,255,0.55);
            font-size: 0.8em;
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        /* ── Search ── */
        .search-wrapper { display: flex; justify-content: center; flex-shrink: 0; }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.14);
            border: 1.5px solid rgba(255,255,255,0.28);
            backdrop-filter: blur(14px);
            border-radius: 50px;
            padding: 8px 18px;
            width: 100%;
            max-width: 400px;
            gap: 10px;
            transition: background .22s, border-color .22s, box-shadow .22s;
        }

        .search-box:focus-within {
            background: rgba(255,255,255,0.24);
            border-color: rgba(255,255,255,0.6);
            box-shadow: 0 4px 20px rgba(0,0,0,0.16);
        }

        .search-box input {
            background: none; border: none; outline: none;
            color: #fff; font-size: 0.92em; width: 100%; font-family: inherit;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.5); }

        /* ── Filter pills ── */
        .filters {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .pill {
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.78em;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
            transition: background .2s, color .2s, border-color .2s, transform .18s;
            user-select: none;
        }

        .pill:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
            transform: translateY(-1px);
        }

        .pill.active {
            background: rgba(255,255,255,0.92);
            color: #1a1a2e;
            border-color: transparent;
            box-shadow: 0 3px 12px rgba(0,0,0,0.18);
        }

        /* ── Grid ── */
        .grid-wrapper {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: flex-start;
            padding-top: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 1240px;
            margin: 0 auto;
        }

        /* ── Cards ── */
        .app-card {
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(255,255,255,0.45);
            border-radius: 20px;
            padding: 20px 12px 16px;
            backdrop-filter: blur(12px);
            text-align: center;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInUp 0.4s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            transition:
                transform 0.25s cubic-bezier(0.22, 0.61, 0.36, 1),
                box-shadow 0.25s ease,
                background 0.25s ease,
                opacity 0.2s ease;
        }

        .app-card:hover {
            transform: translateY(-5px) scale(1.04);
            box-shadow: 0 14px 32px rgba(0,0,0,0.22);
            background: rgba(255,255,255,0.93);
        }

        .app-card:active {
            transform: translateY(-2px) scale(1.01);
        }

        .app-card.hidden {
            display: none;
        }

        .img-wrapper {
            width: 70px;
            height: 70px;
            margin: 0 auto 12px;
            border-radius: 17px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.09);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: box-shadow 0.25s ease;
        }

        .app-card:hover .img-wrapper {
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
        }

        .app-card img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            border-radius: 10px;
        }

        .app-card a {
            display: block;
            text-decoration: none;
            color: #1a1a2e;
            font-weight: 600;
            font-size: 0.83em;
            line-height: 1.3;
        }

        /* ── No results ── */
        .no-results {
            display: none;
            text-align: center;
            color: rgba(255,255,255,0.65);
            font-size: 0.95em;
            width: 100%;
            padding: 20px;
        }

        /* ── Animation ── */
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .grid .app-card:nth-child(1)  { animation-delay: 0.04s; }
        .grid .app-card:nth-child(2)  { animation-delay: 0.08s; }
        .grid .app-card:nth-child(3)  { animation-delay: 0.12s; }
        .grid .app-card:nth-child(4)  { animation-delay: 0.16s; }
        .grid .app-card:nth-child(5)  { animation-delay: 0.20s; }
        .grid .app-card:nth-child(6)  { animation-delay: 0.24s; }
        .grid .app-card:nth-child(7)  { animation-delay: 0.28s; }
        .grid .app-card:nth-child(8)  { animation-delay: 0.32s; }
        .grid .app-card:nth-child(9)  { animation-delay: 0.36s; }
        .grid .app-card:nth-child(10) { animation-delay: 0.40s; }
        .grid .app-card:nth-child(11) { animation-delay: 0.44s; }
        .grid .app-card:nth-child(12) { animation-delay: 0.48s; }
        .grid .app-card:nth-child(13) { animation-delay: 0.52s; }
        .grid .app-card:nth-child(14) { animation-delay: 0.56s; }
        .grid .app-card:nth-child(15) { animation-delay: 0.60s; }
        .grid .app-card:nth-child(16) { animation-delay: 0.64s; }
        .grid .app-card:nth-child(17) { animation-delay: 0.68s; }
        .grid .app-card:nth-child(18) { animation-delay: 0.72s; }
        .grid .app-card:nth-child(19) { animation-delay: 0.76s; }
        .grid .app-card:nth-child(20) { animation-delay: 0.80s; }
        .grid .app-card:nth-child(21) { animation-delay: 0.84s; }
        .grid .app-card:nth-child(22) { animation-delay: 0.88s; }
        .grid .app-card:nth-child(23) { animation-delay: 0.92s; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            html, body { overflow: auto; }
            .overlay { height: auto; min-height: 100vh; }
            .header h1 { font-size: 1.7em; }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay">

        <div class="header">
            <h1>Sistemas Grupo Locks</h1>
            <p class="subtitle">Acesso rápido</p>
        </div>

        <div class="search-wrapper">
            <div class="search-box">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.2">
                    <circle cx="11" cy="11" r="7"/>
                    <path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="search" placeholder="Pesquisar sistema..." autocomplete="off">
            </div>
        </div>

        <div class="filters">
            <span class="pill active" data-filter="all">Todos</span>
            <span class="pill" data-filter="agricola">Agrícola</span>
            <span class="pill" data-filter="corporativo">Corporativo</span>
            <span class="pill" data-filter="rh">RH</span>
            <span class="pill" data-filter="comunicacao">Comunicação</span>
            <span class="pill" data-filter="relatorios">Relatórios</span>
        </div>

        <div class="grid-wrapper">
            <div class="grid" id="grid">
                <!-- Agrícola -->
                <div class="app-card" data-category="agricola" data-name="eco"><a href="https://ecolocks.pecuariaonline.com.br" target="_blank"><div class="img-wrapper"><img src="eco.png" alt="Eco"></div>Eco</a></div>
                <div class="app-card" data-category="agricola" data-name="tracecotton"><a href="https://locks.tracecotton.app/" target="_blank"><div class="img-wrapper"><img src="tracecotton.png" alt="Tracecotton"></div>Tracecotton</a></div>
                <div class="app-card" data-category="agricola" data-name="agrosig"><a href="http://172.20.10.3:8082/Login" target="_blank"><div class="img-wrapper"><img src="AGROSIG.png" alt="Agrosig"></div>Agrosig</a></div>
                <div class="app-card" data-category="agricola" data-name="siast"><a href="https://acesso.siast.com.br/Account/Login" target="_blank"><div class="img-wrapper"><img src="siast.png" alt="Siast"></div>Siast</a></div>
                <div class="app-card" data-category="agricola" data-name="jacto"><a href="https://connect.jacto.com/login" target="_blank"><div class="img-wrapper"><img src="jacto.png" alt="Jacto"></div>Jacto</a></div>
                <div class="app-card" data-category="agricola" data-name="zeus"><a href="https://portal.zeusagro.com.br/login" target="_blank"><div class="img-wrapper"><img src="zeus.png" alt="Zeus"></div>Zeus</a></div>
                <div class="app-card" data-category="agricola" data-name="protect cropwise"><a href="https://www.cropwise.com/protector" target="_blank"><div class="img-wrapper"><img src="protect.png" alt="Protect"></div>Protect</a></div>
                <div class="app-card" data-category="agricola" data-name="john deere johndeere"><a href="https://www.deere.com.br/pt/index.html" target="_blank"><div class="img-wrapper"><img src="johndeere.jpeg" alt="John Deere"></div>John Deere</a></div>

                <!-- Corporativo -->
                <div class="app-card" data-category="corporativo" data-name="sap"><a href="https://rds.grupolocks.com.br/RDWeb" target="_blank"><div class="img-wrapper"><img src="SAP.png" alt="SAP"></div>SAP</a></div>
                <div class="app-card" data-category="corporativo" data-name="pims"><a href="http://pims.grupolocks.com.br:8380/pimsmc/login.jsp" target="_blank"><div class="img-wrapper"><img src="PIMS.png" alt="PIMS"></div>PIMS</a></div>
                <div class="app-card" data-category="corporativo" data-name="fluig"><a href="https://fluig.grupolocks.com.br:8082/" target="_blank"><div class="img-wrapper"><img src="FLUIG.png" alt="Fluig"></div>Fluig</a></div>
                <div class="app-card" data-category="corporativo" data-name="rm totvs"><a href="https://rds.grupolocks.com.br/RDWeb" target="_blank"><div class="img-wrapper"><img src="RM.png" alt="RM"></div>RM</a></div>
                <div class="app-card" data-category="corporativo" data-name="cadan"><a href="https://cadan.grupolocks.com.br/" target="_blank"><div class="img-wrapper"><img src="logocadan.png" alt="Cadan"></div>Cadan</a></div>
                <div class="app-card" data-category="corporativo" data-name="logic"><a href="https://logichml.grupolocks.com.br/" target="_blank"><div class="img-wrapper"><img src="logic.png" alt="Logic"></div>Logic</a></div>
                <div class="app-card" data-category="corporativo" data-name="ats"><a href="https://ats.alltank.com.br/" target="_blank"><div class="img-wrapper"><img src="ats.png" alt="ATS"></div>ATS</a></div>
                <div class="app-card" data-category="corporativo" data-name="argoit"><a href="https://www.argoit.com.br/confianca/nx/login.aspx?cliente=grupolocks#!/autenticacao/login" target="_blank"><div class="img-wrapper"><img src="argoit.png" alt="Argoit"></div>Argoit</a></div>
                <!-- RH -->
                <div class="app-card" data-category="rh" data-name="meu rh meurh"><a href="http://colaborador.grupolocks.com.br/rm/web/app/RH/PortalMeuRH/#/login" target="_blank"><div class="img-wrapper"><img src="meurh.png" alt="Meu RH"></div>Meu RH</a></div>
                <div class="app-card" data-category="rh" data-name="elofy"><a href="https://app.elofy.com.br/" target="_blank"><div class="img-wrapper"><img src="elofy.png" alt="Elofy"></div>Elofy</a></div>
                <div class="app-card" data-category="corporativo" data-name="paytrack"><a href="https://paytrack.com.br/" target="_blank"><div class="img-wrapper"><img src="paytrack.png" alt="Paytrack"></div>Paytrack</a></div>

                <!-- Comunicação -->
                <div class="app-card" data-category="comunicacao" data-name="email e-mail outlook"><a href="https://login.microsoftonline.com" target="_blank"><div class="img-wrapper"><img src="OUTLOOK.png" alt="E-mail"></div>E-mail</a></div>
                <div class="app-card" data-category="comunicacao" data-name="bry assinatura"><a href="https://cloud.bry.com.br" target="_blank"><div class="img-wrapper"><img src="BRY.png" alt="Bry"></div>Bry</a></div>
                <div class="app-card" data-category="comunicacao" data-name="sharepoint"><a href="https://tinyurl.com/sharepoint-locks" target="_blank"><div class="img-wrapper"><img src="sharepoint.png" alt="SharePoint"></div>SharePoint</a></div>

                <!-- Relatórios -->
                <div class="app-card" data-category="relatorios" data-name="report server reportserver"><a href="http://172.20.10.7/Reports/browse/" target="_blank"><div class="img-wrapper"><img src="ReportServer.png" alt="Report Server"></div>Report Server</a></div>
                <div class="app-card" data-category="relatorios" data-name="powerbi power bi"><a href="https://app.powerbi.com/singleSignOn" target="_blank"><div class="img-wrapper"><img src="powerbi.png" alt="PowerBi"></div>PowerBI</a></div>
            </div>
            <p class="no-results" id="no-results">Nenhum sistema encontrado.</p>
        </div>

    </div>

    <script>
        const searchInput = document.getElementById('search');
        const noResults   = document.getElementById('no-results');
        const pills       = document.querySelectorAll('.pill');
        const cards       = document.querySelectorAll('.app-card');

        let activeFilter = 'all';

        function applyFilters() {
            const q = searchInput.value.trim().toLowerCase();
            let visible = 0;

            cards.forEach(card => {
                const cat    = card.dataset.category;
                const name   = card.dataset.name || '';
                const label  = card.querySelector('a')?.textContent.toLowerCase() || '';

                const matchesFilter = activeFilter === 'all' || cat === activeFilter;
                const matchesSearch = !q || name.includes(q) || label.includes(q);

                const show = matchesFilter && matchesSearch;
                card.classList.toggle('hidden', !show);
                if (show) visible++;
            });

            noResults.style.display = visible === 0 ? 'block' : 'none';
        }

        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                activeFilter = pill.dataset.filter;
                searchInput.value = '';
                applyFilters();
            });
        });

        searchInput.addEventListener('input', () => {
            // quando digitar, volta o pill para "Todos"
            if (activeFilter !== 'all') {
                pills.forEach(p => p.classList.remove('active'));
                document.querySelector('[data-filter="all"]').classList.add('active');
                activeFilter = 'all';
            }
            applyFilters();
        });
    </script>
</body>
</html>
